name: Deploy to Hosting

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Deploy via SSH
        run: npm run deploy
        env:
          # Para mayor seguridad, puedes configurar SSH_PASSWORD en Settings > Secrets and variables > Actions
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
